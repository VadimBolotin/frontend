name: Telegram Notifications

on:
  workflow_run:
    workflows: ['Lint and Build']
    types:
      - completed
    branches: [main]

jobs:
  notify-telegram:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Get commit title
        id: get_commit
        run: |
          # Получаем SHA последнего коммита
          COMMIT_SHA=${{ github.event.workflow_run.head_sha }}
          # Получаем тайтл коммита (первая строка) через API
          COMMIT_TITLE=$(curl -s -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/commits/$COMMIT_SHA \
            | jq -r '.commit.message' | head -n1)
          echo "commit_title=$COMMIT_TITLE" >> $GITHUB_OUTPUT

      - name: Send Telegram notification
        uses: cbrgm/telegram-github-action@v1
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          message: |
            ✅ **Успешный пуш в ${{ github.event.workflow_run.head_branch }}!**

            📝 **Тайтл коммита:** ${{ steps.get_commit.outputs.commit_title }}
            👤 **Автор:** ${{ github.event.workflow_run.actor.login }}
            💬 **Ссылка:** https://github.com/${{ github.repository }}/tree/${{ github.event.workflow_run.head_branch }}
            ⏰ **Время:** ${{ github.event.workflow_run.created_at }}
